<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simple Cricket Game</title>
    <link rel="stylesheet" href="cricket.css" />
  </head>
  <body>
    <h1>Bat Ball Stump Game</h1>
    <div class="button-container">
      <button
        onclick="
          userChoice = 'bat';
          let computerChoice = getComputerChoice();
          displayResult(userChoice, computerChoice);
        "
      >
        Bat
      </button>

      <button
        onclick="
          userChoice = 'ball';
          computerChoice = getComputerChoice();
          displayResult(userChoice, computerChoice);
        "
      >
        Ball
      </button>
      <button
        onclick="
          userChoice = 'stump';
          computerChoice = getComputerChoice();
          displayResult(userChoice, computerChoice);
        "
      >
        Stump
      </button>

      <button
        onclick="
          localStorage.clear();
          score = {
            won: 0,
            lost: 0,
            tied: 0,
            showScore: function () {
              return `Wins: ${this.won}, Losses: ${this.lost}, Ties: ${this.tied}`;
            },
          };
          displayResult();
        "
      >
        Reset Score
      </button>

      <h3 id="user-choice"></h3>
      <h3 id="computer-choice"></h3>
      <h3 id="result"></h3>
      <h3 id="score"></h3>
    </div>

    <script>
      let scoreStr = localStorage.getItem("Score");
      let score = JSON.parse(scoreStr) || {
        won: 0,
        lost: 0,
        tied: 0,
      };
      score.showScore = function () {
        return `Wins: ${this.won}, Losses: ${this.lost}, Ties: ${this.tied}`;
      };

      displayResult();

      function getComputerChoice() {
        let randomNumber = Math.floor(Math.random() * 3);
        let computerChoice = "";
        if (randomNumber === 0) {
          computerChoice = "bat";
        } else if (randomNumber === 1) {
          computerChoice = "ball";
        } else {
          computerChoice = "stump";
        }
        console.log("Computer chose: " + computerChoice);

        return computerChoice;
      }

      function getResult(userChoice, computerChoice) {
        if (userChoice === computerChoice) {
          score.tied += 1;
          return "tie";
        } else if (
          (userChoice === "bat" && computerChoice === "ball") ||
          (userChoice === "ball" && computerChoice === "stump") ||
          (userChoice === "stump" && computerChoice === "bat")
        ) {
          score.won += 1;
          return "win";
        } else {
          score.lost += 1;
          return "lose";
        }
      }

      function displayResult(userChoice, computerChoice) {
        let resultText = "";
        if (userChoice && computerChoice) {
          resultText = getResult(userChoice, computerChoice);
        }
        localStorage.setItem("Score", JSON.stringify(score));

        document.querySelector("#user-choice").innerText = userChoice
          ? `You chose: ${userChoice}`
          : "";

        document.querySelector("#computer-choice").innerText = computerChoice
          ? `Computer chose: ${computerChoice}`
          : "";

        document.querySelector("#result").innerText = resultText;

        document.querySelector("#score").innerText = score.showScore();
      }
    </script>
  </body>
</html>
